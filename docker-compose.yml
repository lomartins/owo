version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: owo-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-owo_dev}
      POSTGRES_USER: ${DB_USER:-owo}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-owo_dev_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./scripts/schema.sql:/docker-entrypoint-initdb.d/02-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-owo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - owo-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  owo-network:
    driver: bridge
